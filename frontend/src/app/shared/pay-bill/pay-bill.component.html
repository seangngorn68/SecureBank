<div *ngIf="show" class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" (click)="close.emit()"></div>
  <div class="relative bg-white rounded-3xl shadow-2xl w-full max-w-sm z-10 overflow-hidden">

    <!-- Header -->
    <div class="bg-gradient-to-br from-purple-600 to-purple-800 px-6 pt-6 pb-5 text-white">
      <div class="flex items-center justify-between">
        <div>
          <h2 class="text-xl font-bold">Pay Bill</h2>
          <p class="text-purple-200 text-sm mt-0.5">
            {{ step === 1 ? 'Select a service' : selectedBill?.name }}
          </p>
        </div>
        <button (click)="close.emit()" class="w-9 h-9 bg-white/20 hover:bg-white/30 rounded-xl flex items-center justify-center transition">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="p-6">

      <!-- Step 1: Select Bill Type -->
      <div *ngIf="step === 1" class="grid grid-cols-2 gap-3">
        <button *ngFor="let bill of billTypes" (click)="selectBill(bill)"
          class="flex flex-col items-center gap-2 p-4 rounded-2xl border-2 border-gray-100 hover:border-purple-300 hover:bg-purple-50 transition group">
          <div [class]="'w-12 h-12 rounded-xl flex items-center justify-center text-2xl ' + bill.color">
            {{ bill.icon }}
          </div>
          <p class="text-xs font-medium text-gray-700 text-center leading-tight">{{ bill.name }}</p>
        </button>
      </div>

      <!-- Step 2: Enter details -->
      <div *ngIf="step === 2 && !success">
        <button (click)="step = 1" class="flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-5 transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
          Back
        </button>

        <!-- Bill icon + name -->
        <div class="flex items-center gap-3 mb-5 p-4 bg-gray-50 rounded-2xl">
          <div [class]="'w-12 h-12 rounded-xl flex items-center justify-center text-2xl ' + selectedBill?.color">
            {{ selectedBill?.icon }}
          </div>
          <div>
            <p class="font-semibold text-gray-800">{{ selectedBill?.name }}</p>
            <p class="text-xs text-gray-400">Instant payment</p>
          </div>
        </div>

        <!-- Bill number -->
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Account / Reference Number</label>
          <input type="text" [(ngModel)]="billNumber"
            class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-purple-500 focus:outline-none text-sm transition"
            [placeholder]="selectedBill?.placeholder || 'Enter reference'"/>
        </div>

        <!-- Amount -->
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Amount</label>
          <div class="relative">
            <span class="absolute left-4 top-3.5 text-gray-400 text-sm">$</span>
            <input type="number" [(ngModel)]="amount" min="0.5"
              class="w-full pl-8 pr-4 py-3 rounded-xl border-2 border-gray-200 focus:border-purple-500 focus:outline-none text-sm transition"
              placeholder="0.00"/>
          </div>
          <!-- Quick amounts -->
          <div class="flex gap-2 mt-2">
            <button *ngFor="let q of [5, 10, 20, 50]" (click)="amount = q"
              [class]="'flex-1 py-1.5 text-xs font-medium rounded-lg border transition ' +
                (amount === q ? 'border-purple-500 bg-purple-50 text-purple-600' : 'border-gray-200 text-gray-500 hover:border-purple-300')">
              ${{ q }}
            </button>
          </div>
        </div>

        <!-- Pay from account -->
        <div class="mb-5">
          <label class="block text-sm font-medium text-gray-700 mb-1">Pay from</label>
          <select [(ngModel)]="selectedAccountId"
            class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-purple-500 focus:outline-none text-sm bg-white transition">
            <option [value]="0" disabled>Select account</option>
            <option *ngFor="let a of accounts" [value]="a.id">
              {{ a.name }} — ${{ a.balance }}
            </option>
          </select>
        </div>

        <div *ngIf="error" class="mb-4 p-3 bg-red-50 text-red-600 text-sm rounded-xl">{{ error }}</div>

        <button (click)="pay()" [disabled]="isSaving || !amount || !selectedAccountId"
          class="w-full py-3.5 rounded-xl bg-purple-600 hover:bg-purple-700 disabled:bg-purple-300 text-white font-bold transition">
          {{ isSaving ? 'Processing...' : 'Pay ' + (amount ? fmt(amount) : '') }}
        </button>
      </div>

      <!-- Success -->
      <div *ngIf="success" class="text-center py-4">
        <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center text-3xl mx-auto mb-4">✅</div>
        <h3 class="text-xl font-bold text-gray-800">Payment Successful!</h3>
        <p class="text-gray-500 text-sm mt-2">
          {{ fmt(amount) }} paid to {{ selectedBill?.name }}
        </p>
        <p class="text-xs text-gray-400 mt-1">Ref: {{ billNumber || 'N/A' }}</p>
        <button (click)="close.emit()"
          class="mt-6 w-full py-3 rounded-xl bg-green-600 hover:bg-green-700 text-white font-semibold transition">
          Done
        </button>
      </div>

    </div>
  </div>
</div>
