<div *ngIf="show" class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" (click)="close.emit()"></div>

  <div class="relative bg-white rounded-3xl shadow-2xl w-full max-w-sm z-10 overflow-hidden">

    <!-- Header gradient -->
    <div class="bg-gradient-to-br from-blue-600 to-blue-800 px-6 pt-6 pb-8 text-white">
      <div class="flex items-center justify-between mb-4">
        <div>
          <h2 class="text-xl font-bold">Receive via KHQR</h2>
          <p class="text-blue-200 text-sm mt-0.5">Generate QR for any bank to scan</p>
        </div>
        <button (click)="close.emit()"
          class="w-9 h-9 flex items-center justify-center rounded-xl bg-white/20 hover:bg-white/30 transition text-white">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <!-- Supported banks -->
      <div class="flex items-center gap-2 flex-wrap">
        <span *ngFor="let b of ['ABA','ACLEDA','KB','Wing','Canadia']"
          class="text-xs bg-white/20 px-2.5 py-1 rounded-full font-medium">
          {{ b }}
        </span>
        <span class="text-xs text-blue-300">+ more</span>
      </div>
    </div>

    <div class="px-6 pb-6 -mt-4">

      <!-- Step 1: Enter Details -->
      <div *ngIf="!generated" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">

        <!-- Bakong ID -->
        <div class="mb-4">
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">
            Your Bakong ID
            <span class="text-xs font-normal text-gray-400 ml-1">(your phone&#64;bank)</span>
          </label>
          <div class="relative">
            <input type="text" [(ngModel)]="bakongId"
              class="w-full px-4 py-3 pr-20 rounded-xl border-2 border-gray-200 focus:border-blue-500 focus:outline-none text-sm font-mono transition"
              placeholder="012345678@aba"/>
            <button (click)="copyId()" *ngIf="bakongId"
              class="absolute right-3 top-2.5 text-xs text-blue-600 font-medium hover:text-blue-800 transition">
              {{ copied ? '✓ Copied' : 'Copy' }}
            </button>
          </div>
          <div class="flex flex-wrap gap-1 mt-2">
            <button *ngFor="let b of ['@aba','@acb','@camkr','@wing']"
              (click)="bakongId = bakongId.split('@')[0] + b"
              class="text-xs px-2 py-1 bg-gray-100 hover:bg-blue-50 hover:text-blue-600 rounded-lg transition">
              {{ b }}
            </button>
          </div>
        </div>

        <!-- Amount (optional) -->
        <div class="mb-4">
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">
            Amount
            <span class="text-xs font-normal text-gray-400 ml-1">(optional — leave blank for any)</span>
          </label>
          <div class="flex gap-2">
            <div class="relative flex-1">
              <span class="absolute left-3 top-3 text-gray-400 text-sm">{{ currency === 'USD' ? '$' : '៛' }}</span>
              <input type="number" [(ngModel)]="amount" min="0"
                class="w-full pl-7 pr-3 py-2.5 rounded-xl border-2 border-gray-200 focus:border-blue-500 focus:outline-none text-sm transition"
                placeholder="0.00"/>
            </div>
            <div class="flex border-2 border-gray-200 rounded-xl overflow-hidden">
              <button (click)="currency = 'USD'"
                [class]="'px-3 py-2 text-sm font-medium transition ' + (currency === 'USD' ? 'bg-blue-600 text-white' : 'text-gray-500 hover:bg-gray-50')">
                USD
              </button>
              <button (click)="currency = 'KHR'"
                [class]="'px-3 py-2 text-sm font-medium transition ' + (currency === 'KHR' ? 'bg-blue-600 text-white' : 'text-gray-500 hover:bg-gray-50')">
                KHR
              </button>
            </div>
          </div>
          <!-- Quick amounts -->
          <div class="flex gap-2 mt-2">
            <button *ngFor="let q of [5, 10, 25, 50, 100]"
              (click)="amount = q"
              [class]="'flex-1 py-1.5 text-xs font-medium rounded-lg border transition ' +
                (amount === q ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-gray-200 text-gray-500 hover:border-blue-300')">
              ${{ q }}
            </button>
          </div>
        </div>

        <!-- Note -->
        <div class="mb-5">
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Note / Invoice #</label>
          <input type="text" [(ngModel)]="note"
            class="w-full px-4 py-2.5 rounded-xl border-2 border-gray-200 focus:border-blue-500 focus:outline-none text-sm transition"
            placeholder="e.g. Payment for order #001"/>
        </div>

        <button (click)="generate()" [disabled]="!bakongId.trim() || isGenerating"
          class="w-full py-3 rounded-xl bg-blue-600 hover:bg-blue-700 disabled:bg-blue-300 text-white font-bold transition text-sm flex items-center justify-center gap-2">
          <svg *ngIf="!isGenerating" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.243m-4.243 0L9.07 9.07M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          {{ isGenerating ? 'Generating...' : 'Generate KHQR' }}
        </button>
      </div>

      <!-- Step 2: Show QR -->
      <div *ngIf="generated" class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">

        <!-- QR Code -->
        <div class="p-5 text-center">
          <div class="inline-block p-3 bg-white rounded-2xl shadow-md border border-gray-100">
            <img [src]="qrDataUrl" alt="KHQR Code" class="w-52 h-52"/>
          </div>

          <!-- Amount badge -->
          <div *ngIf="amount" class="mt-3">
            <span class="text-2xl font-extrabold text-gray-800">
              {{ currency === 'USD' ? '$' : '៛' }}{{ amount | number:'1.2-2' }}
            </span>
            <span class="text-gray-400 ml-1 text-sm">{{ currency }}</span>
          </div>
          <div *ngIf="!amount" class="mt-3">
            <span class="text-sm text-gray-400">Any amount accepted</span>
          </div>

          <!-- Bakong ID -->
          <div class="mt-2 flex items-center justify-center gap-2">
            <span class="text-xs font-mono text-gray-500 bg-gray-100 px-3 py-1.5 rounded-lg">
              {{ bakongId }}
            </span>
          </div>
        </div>

        <!-- Bank icons row -->
        <div class="px-5 pb-4 text-center">
          <p class="text-xs text-gray-400 mb-2">Scan with any Cambodian bank app</p>
          <div class="flex items-center justify-center gap-2 flex-wrap">
            <span *ngFor="let b of ['🏦 ABA','🏦 ACLEDA','🏦 KB','💙 Wing']"
              class="text-xs bg-gray-50 border border-gray-200 px-2 py-1 rounded-lg text-gray-600">
              {{ b }}
            </span>
          </div>
        </div>

        <!-- Action buttons -->
        <div class="border-t border-gray-100 grid grid-cols-3 divide-x divide-gray-100">
          <button (click)="downloadQr()"
            class="py-3 text-xs font-medium text-gray-600 hover:bg-gray-50 transition flex flex-col items-center gap-1">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
            </svg>
            Download
          </button>
          <button (click)="copyId()"
            class="py-3 text-xs font-medium text-gray-600 hover:bg-gray-50 transition flex flex-col items-center gap-1">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
            </svg>
            {{ copied ? '✓ Copied' : 'Copy ID' }}
          </button>
          <button (click)="reset()"
            class="py-3 text-xs font-medium text-blue-600 hover:bg-blue-50 transition flex flex-col items-center gap-1">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
            New QR
          </button>
        </div>
      </div>

    </div>
  </div>
</div>
