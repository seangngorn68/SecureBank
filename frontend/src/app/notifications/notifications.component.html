<div class="space-y-6">

  <!-- Header -->
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-gray-800">Notifications</h1>
      <p class="text-gray-500 mt-1">
        {{ unreadCount > 0 ? unreadCount + ' unread notification' + (unreadCount > 1 ? 's' : '') : 'All caught up!' }}
      </p>
    </div>
    <button *ngIf="unreadCount > 0" (click)="markAllRead()" [disabled]="isMarkingAll"
      class="text-sm font-medium text-blue-600 hover:text-blue-800 px-4 py-2 rounded-xl hover:bg-blue-50 transition disabled:opacity-50">
      {{ isMarkingAll ? 'Marking...' : 'Mark all as read' }}
    </button>
  </div>

  <!-- Filter tabs -->
  <div class="flex gap-2 flex-wrap">
    <button *ngFor="let tab of [
      {key: 'all',    label: 'All'},
      {key: 'unread', label: 'Unread'},
      {key: 'credit', label: '💰 Income'},
      {key: 'debit',  label: '💸 Expense'},
      {key: 'info',   label: 'ℹ️ Info'}
    ]" (click)="filter = $any(tab.key)"
      [class]="'px-4 py-2 rounded-xl text-sm font-medium transition border ' +
        (filter === tab.key
          ? 'bg-blue-600 text-white border-blue-600'
          : 'bg-white text-gray-600 border-gray-200 hover:border-blue-300 hover:text-blue-600')">
      {{ tab.label }}
      <span *ngIf="tab.key === 'unread' && unreadCount > 0"
        class="ml-1 bg-white text-blue-600 text-xs rounded-full px-1.5 py-0.5 font-bold">
        {{ unreadCount }}
      </span>
    </button>
  </div>

  <!-- Loading skeleton -->
  <div *ngIf="isLoading" class="space-y-3">
    <div *ngFor="let i of [1,2,3,4,5]" class="bg-white rounded-2xl p-4 border border-gray-100 animate-pulse flex gap-4">
      <div class="w-12 h-12 rounded-xl bg-gray-100 flex-shrink-0"></div>
      <div class="flex-1 space-y-2">
        <div class="h-4 bg-gray-100 rounded w-1/3"></div>
        <div class="h-3 bg-gray-100 rounded w-2/3"></div>
      </div>
    </div>
  </div>

  <!-- Empty state -->
  <div *ngIf="!isLoading && filtered.length === 0"
    class="bg-white rounded-2xl p-12 shadow-sm border border-gray-100 text-center">
    <div class="text-5xl mb-4">🔔</div>
    <h3 class="text-lg font-semibold text-gray-600">No notifications</h3>
    <p class="text-gray-400 mt-1 text-sm">Nothing here for the selected filter.</p>
  </div>

  <!-- Notification list -->
  <div *ngIf="!isLoading && filtered.length > 0" class="space-y-2">
    <div *ngFor="let n of filtered"
      (click)="markRead(n)"
      [class]="'bg-white rounded-2xl px-5 py-4 shadow-sm border transition cursor-pointer group ' +
        (n.read ? 'border-gray-100 hover:border-gray-200' : 'border-blue-100 bg-blue-50/30 hover:border-blue-300')">
      <div class="flex items-start gap-4">

        <!-- Icon -->
        <div [class]="'w-11 h-11 rounded-xl flex items-center justify-center text-xl flex-shrink-0 ' + colorFor(n.type)">
          {{ iconFor(n.type) }}
        </div>

        <!-- Content -->
        <div class="flex-1 min-w-0">
          <div class="flex items-start justify-between gap-2">
            <p [class]="'font-semibold text-sm ' + (n.read ? 'text-gray-700' : 'text-gray-900')">
              {{ n.title }}
              <span *ngIf="!n.read" class="ml-2 inline-block w-2 h-2 bg-blue-500 rounded-full align-middle"></span>
            </p>
            <span class="text-xs text-gray-400 flex-shrink-0">
              {{ n.createdAt | date:'MMM d, h:mm a' }}
            </span>
          </div>
          <p class="text-sm text-gray-500 mt-0.5 leading-relaxed">{{ n.message }}</p>
        </div>

        <!-- Delete button -->
        <button (click)="$event.stopPropagation(); delete(n.id)"
          class="opacity-0 group-hover:opacity-100 w-7 h-7 rounded-lg bg-red-50 hover:bg-red-100 text-red-400 hover:text-red-600 flex items-center justify-center transition flex-shrink-0 text-xs">
          ✕
        </button>
      </div>
    </div>
  </div>

</div>
